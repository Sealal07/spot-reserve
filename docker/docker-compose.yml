version: '3.8'

services:
  db:
    image: postgres:15
    container_name: spot_reserve_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: spotreserve_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ..
    container_name: spot_reserve_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:1234@db:5432/spotreserve_db
    depends_on:
      db:
        condition: service_healthy 